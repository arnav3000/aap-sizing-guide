<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AAP 2.4 to 2.6 Sizing Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Ansible Automation Platform Sizing Calculator</h1>
            <p class="subtitle">Calculate AAP 2.6 container resources based on your AAP 2.4 VM deployment</p>
        </header>

        <div class="content">
            <div class="card">
                <div class="card-header">
                    <h2>Current AAP 2.4 Environment</h2>
                    <button id="loadExample" class="btn btn-secondary">Load Example Data</button>
                </div>

                <form id="sizingForm">
                    <!-- Controllers Section -->
                    <div class="form-section">
                        <h3>📊 Automation Controllers</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="num_controllers">Number of Controllers</label>
                                <input type="number" id="num_controllers" name="num_controllers" required min="1">
                            </div>
                            <div class="form-group">
                                <label for="controller_cpu_percent_avg">CPU % (Average)</label>
                                <input type="number" id="controller_cpu_percent_avg" name="controller_cpu_percent_avg" required min="0" max="100">
                            </div>
                            <div class="form-group">
                                <label for="controller_cpu_percent_peak">CPU % (Peak)</label>
                                <input type="number" id="controller_cpu_percent_peak" name="controller_cpu_percent_peak" required min="0" max="100">
                            </div>
                            <div class="form-group">
                                <label for="controller_memory_percent">Memory % (Used)</label>
                                <input type="number" id="controller_memory_percent" name="controller_memory_percent" required min="0" max="100">
                            </div>
                        </div>
                    </div>

                    <!-- Automation Hub Section -->
                    <div class="form-section">
                        <h3>📦 Automation Hub</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="num_hub_nodes">Number of Hub Nodes</label>
                                <input type="number" id="num_hub_nodes" name="num_hub_nodes" min="0" value="0">
                            </div>
                            <div class="form-group">
                                <label for="hub_cpu_percent">CPU % (Average)</label>
                                <input type="number" id="hub_cpu_percent" name="hub_cpu_percent" min="0" max="100" value="25">
                            </div>
                            <div class="form-group">
                                <label for="hub_memory_percent">Memory % (Used)</label>
                                <input type="number" id="hub_memory_percent" name="hub_memory_percent" min="0" max="100" value="30">
                            </div>
                        </div>
                    </div>

                    <!-- Execution Nodes Section -->
                    <div class="form-section">
                        <h3>⚙️ Execution Nodes</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="num_execution_nodes">Number of Execution Nodes</label>
                                <input type="number" id="num_execution_nodes" name="num_execution_nodes" required min="1">
                            </div>
                            <div class="form-group">
                                <label for="execution_cpu_percent">CPU % (Average)</label>
                                <input type="number" id="execution_cpu_percent" name="execution_cpu_percent" required min="0" max="100">
                            </div>
                            <div class="form-group">
                                <label for="execution_memory_percent">Memory % (Average)</label>
                                <input type="number" id="execution_memory_percent" name="execution_memory_percent" required min="0" max="100">
                            </div>
                            <div class="form-group">
                                <label for="forks_observed">Forks Observed</label>
                                <input type="number" id="forks_observed" name="forks_observed" min="1" value="150">
                            </div>
                        </div>
                    </div>

                    <!-- Database Section -->
                    <div class="form-section">
                        <h3>💾 Database</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="database_vcpu">vCPU</label>
                                <input type="number" id="database_vcpu" name="database_vcpu" required min="1">
                            </div>
                            <div class="form-group">
                                <label for="database_memory_gb">Memory (GB)</label>
                                <input type="number" id="database_memory_gb" name="database_memory_gb" required min="1">
                            </div>
                            <div class="form-group">
                                <label for="database_cpu_percent">CPU % (Average)</label>
                                <input type="number" id="database_cpu_percent" name="database_cpu_percent" required min="0" max="100">
                            </div>
                            <div class="form-group">
                                <label for="database_memory_percent">Memory % (Average)</label>
                                <input type="number" id="database_memory_percent" name="database_memory_percent" required min="0" max="100">
                            </div>
                            <div class="form-group">
                                <label for="concurrent_db_requests_peak">Peak Concurrent DB Requests</label>
                                <input type="number" id="concurrent_db_requests_peak" name="concurrent_db_requests_peak" min="0" value="0">
                            </div>
                            <div class="form-group">
                                <label for="db_growth_per_day_gb">DB Growth per Day (GB)</label>
                                <input type="number" id="db_growth_per_day_gb" name="db_growth_per_day_gb" min="0" value="0">
                            </div>
                        </div>
                    </div>

                    <!-- Workload Section -->
                    <div class="form-section">
                        <h3>🔄 Workload Metrics</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="playbooks_per_day_peak">Playbooks/Day (Peak)</label>
                                <input type="number" id="playbooks_per_day_peak" name="playbooks_per_day_peak" required min="0">
                            </div>
                            <div class="form-group">
                                <label for="concurrent_jobs_peak">Concurrent Jobs (Peak)</label>
                                <input type="number" id="concurrent_jobs_peak" name="concurrent_jobs_peak" required min="0">
                            </div>
                            <div class="form-group">
                                <label for="concurrent_jobs_pending">Concurrent Jobs (Pending)</label>
                                <input type="number" id="concurrent_jobs_pending" name="concurrent_jobs_pending" min="0" value="0">
                            </div>
                            <div class="form-group">
                                <label for="job_retention_hours">Job Retention (Hours)</label>
                                <input type="number" id="job_retention_hours" name="job_retention_hours" required min="1">
                            </div>
                            <div class="form-group">
                                <label for="managed_hosts">Managed Hosts</label>
                                <input type="number" id="managed_hosts" name="managed_hosts" required min="1">
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Calculate Sizing</button>
                        <button type="reset" class="btn btn-secondary">Reset Form</button>
                    </div>
                </form>
            </div>

            <!-- Results Section -->
            <div id="results" class="card" style="display: none;">
                <div class="card-header">
                    <h2>AAP 2.6 Sizing Recommendations</h2>
                </div>

                <div id="resultsContent"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
